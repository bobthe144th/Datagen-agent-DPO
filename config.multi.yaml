# config.multi.yaml — Multi-model manifest for the orchestrator
#
# Usage:
#   export OPENROUTER_API_KEY=sk-or-...
#   python orchestrator.py --multi config.multi.yaml
#
# Both models run in parallel. Each writes to its own output file.
# Progress bars and logs are interleaved; the final summary prints when
# the last model finishes.

models:
  - label: minimax-m2.5
    config: config.minimax.yaml   # 1 000 examples

  - label: aurora-alpha
    config: config.aurora.yaml    # 10 000 examples
