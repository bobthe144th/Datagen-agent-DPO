# config.dpo.yaml — DPO pair generation
#
# Chosen:   correct, complete implementation (DEFAULT system prompt)
# Rejected: same task, same tool use, but with one or two subtle code flaws
#
# Usage:
#   export OPENROUTER_API_KEY=sk-or-...
#   python cli.py -c config.dpo.yaml
#
# Or run in parallel alongside SFT jobs:
#   python orchestrator.py --multi config.multi.yaml

api:
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1/chat/completions"
  model: "openrouter/aurora-alpha"
  api_key_env: "OPENROUTER_API_KEY"
  timeout: 120

prompts:
  source: "prompts/dpo_prompts.md"   # one prompt per line
  limit: 0                            # 0 = all
  shuffle: true

workspace:
  base_dir: "agentic_workspaces"
  cleanup: true
  preserve_on_error: true

agent:
  max_turns: 30
  tools_enabled:
    - read_file
    - write_file
    - edit_file
    - list_directory
    - search_code
    - run_command
    - resolve_library_id
    - get_library_docs

  sandbox:
    enabled: true
    image: "python:3.12-slim"
    timeout: 30
    memory: "512m"
    cpus: "1.0"
    extra_packages: []
    env: {}

dpo:
  enabled: true
  # Chosen session: correct implementation, standard temperature
  chosen_temperature: 0.6
  # Rejected session: subtly flawed implementation, slightly higher temp
  # to encourage variation in which flaw the model introduces
  rejected_temperature: 0.75
  # System prompts are loaded from generator.py:
  #   CHOSEN_SYSTEM_PROMPT  → DEFAULT (the main production prompt)
  #   REJECTED_SYSTEM_PROMPT → subtle-flaw injection prompt

output:
  dataset_file: "datasets/dpo_pairs.jsonl"
  error_dataset_file: "datasets/dpo_errors.jsonl"
  append_mode: true

processing:
  # Each prompt spawns 2 sessions — effective API concurrency is 2× this
  concurrency: 10
  resume: true
